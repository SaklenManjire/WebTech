<!DOCTYPE html>
<html>

<head>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>

<body>
    <div class="container mt-5">
        <div class="list-group">
            <a href="#" class="list-group-item list-group-item-action text-center fw-bolder active " aria-current="true">User Names</a>
        </div>
    </div>
    <script>
        const name = document.getElementById("items")
        const getUserData = async() => {
            let user = await fetch("https://jsonplaceholder.typicode.com/users/")
            let data = await user.json() 
            
            data.forEach(e => {
                const list_item = document.createElement("a")
                list_item.classList.add("list-group-item","list-group-item-action")
                list_item.textContent = e.name
                document.querySelector(".list-group").appendChild(list_item)
            });
        }
        getUserData()
    </script>
</body>

</html>
